name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install image dependencies
        run: python -m pip install --quiet pillow

      - name: Prepare site artifact
        run: |
          python - <<'PY'
          import glob
          import json
          import os
          from PIL import Image

          os.makedirs("content", exist_ok=True)
          os.makedirs("assets/works", exist_ok=True)
          os.makedirs(os.path.join("assets", "works", ".thumbs"), exist_ok=True)

          image_exts = {".jpg", ".jpeg", ".png", ".webp", ".gif", ".avif"}
          works_root = os.path.join("assets", "works")

          def norm(path):
            return path.replace("\\", "/")

          def title_from_slug(slug):
            return slug.replace("_", " ").replace("-", " ").strip() or "Галерея"

          def collect_images(folder):
            out = []
            for current, _, files in os.walk(folder):
              for name in files:
                ext = os.path.splitext(name)[1].lower()
                if ext in image_exts:
                  out.append(norm(os.path.join(current, name)))
            return sorted(out)

          def create_thumb(src, slug):
            base_name = os.path.splitext(os.path.basename(src))[0] + ".jpg"
            out_dir = os.path.join("assets", "works", ".thumbs", slug)
            os.makedirs(out_dir, exist_ok=True)
            out_path = os.path.join(out_dir, base_name)
            out_rel = norm(out_path)
            try:
              img = Image.open(src)
              if img.mode not in ("RGB", "L"):
                img = img.convert("RGB")
              img.thumbnail((560, 560))
              img.save(out_path, format="JPEG", quality=82, optimize=True)
            except Exception:
              # Fallback: use original if thumbnail generation fails
              return norm(src)
            return out_rel

          galleries = []
          for name in sorted(os.listdir(works_root)):
            if name.startswith("."):
              continue

            gallery_dir = os.path.join(works_root, name)
            if not os.path.isdir(gallery_dir):
              continue

            images = collect_images(gallery_dir)
            if not images:
              continue

            meta_path = os.path.join(gallery_dir, "meta.json")
            meta = {}
            if os.path.exists(meta_path):
              with open(meta_path, "r", encoding="utf-8") as fp:
                meta = json.load(fp) or {}

            slug = name
            title = meta.get("title") or title_from_slug(slug)
            description = meta.get("description") or ""
            cover_rel = meta.get("cover") or meta.get("preview")
            cover = norm(os.path.join(gallery_dir, cover_rel)) if cover_rel else images[0]
            if cover not in images:
              cover = images[0]

            image_items = []
            for src in images:
              image_items.append({
                "src": src,
                "thumb": create_thumb(src, slug),
              })

            cover_thumb = create_thumb(cover, slug)
            galleries.append({
              "slug": slug,
              "title": title,
              "description": description,
              "cover": cover,
              "coverThumb": cover_thumb,
              "galleryUrl": f"works.html#{slug}",
              "count": len(images),
              "images": image_items,
            })

          with open("content/work-galleries.json", "w", encoding="utf-8") as fp:
            json.dump(galleries, fp, ensure_ascii=False, indent=2)

          # Backward-compatible lightweight export used by older clients.
          legacy_items = []
          for gallery in galleries:
            legacy_items.append({
              "title": gallery["title"],
              "image": gallery["cover"],
              "thumb": gallery.get("coverThumb", gallery["cover"]),
              "description": gallery["description"],
              "galleryUrl": gallery["galleryUrl"],
            })
          with open("content/works.json", "w", encoding="utf-8") as fp:
            json.dump(legacy_items, fp, ensure_ascii=False, indent=2)
          PY

          mkdir -p _site
          cp index.html _site/
          cp works.html _site/
          cp -r css js assets content _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
